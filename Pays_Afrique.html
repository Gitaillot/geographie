<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{min-height:100vh;min-height:-webkit-fill-available;display:flex;align-items:center;justify-content:center;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:#1a1a2e;color:#eee;overflow:hidden;position:fixed;width:100%;height:100%}
html{height:-webkit-fill-available;overflow:hidden}
.container{text-align:center;max-width:520px;width:95%;padding:.3rem 0 .6rem;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.25rem;margin-bottom:.3rem;font-weight:300;letter-spacing:.05em;color:#aab}
.map-wrapper{width:360px;height:360px;border-radius:18px;overflow:hidden;background:#0d1926;box-shadow:0 10px 40px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.07);margin-bottom:.5rem;flex-shrink:0;position:relative}
#mapSvg{position:absolute;top:0;left:0;width:100%;height:100%}
#mapSvg .country{transition:opacity .35s ease}
#mapSvg .country.dimmed{opacity:.15;filter:saturate(0.2) brightness(0.95)}
#mapSvg .country.active{opacity:1;filter:drop-shadow(0 0 4px rgba(255,210,0,0.7))}
.country-answer{font-size:1.4rem;font-weight:700;color:#f5c842;height:1.8rem;line-height:1.2;white-space:nowrap;margin-bottom:.1rem}
.country-answer .capital{font-size:.95rem;font-weight:400;color:#aabbd4}
.buttons-zone{height:3.4rem;display:flex;align-items:center;justify-content:center;margin-bottom:.25rem;position:relative}
.buttons{display:flex;gap:.55rem;justify-content:center;flex-wrap:wrap;position:absolute}
.buttons.hidden{visibility:hidden;pointer-events:none}
button{padding:14px 22px;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;touch-action:manipulation;position:relative;z-index:100}
button:active:not(:disabled){transform:scale(.95);opacity:.85}
button:disabled{cursor:default;opacity:.35}
.btn-reveal{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;min-width:200px}
.btn-known{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e}
.btn-review5{background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a2e;font-size:.85rem}
.btn-review20{background:linear-gradient(135deg,#f05454,#e8291c);color:#fff;font-size:.85rem}
.btn-restart{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;min-width:200px}
.stats{margin-top:.3rem;font-size:.74rem;color:#667;line-height:1.8}
.done-screen{display:none;padding:2rem 1rem}
.done-screen h2{font-size:1.8rem;margin-bottom:1rem;font-weight:300}
.done-screen p{color:#99a;margin-bottom:2rem;line-height:1.6}
@media(max-width:400px){.map-wrapper{width:300px;height:300px}.country-answer{font-size:1.2rem}button{padding:12px 18px;font-size:.88rem}}
#mapSvg .arc-circle{transition:opacity .35s ease}
#mapSvg .arc-circle.dimmed{opacity:.08}
#mapSvg .arc-circle.active{opacity:1;stroke:#ffd700;stroke-width:2}
</style>
